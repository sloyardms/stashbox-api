server:
  port: 9001

app:
  storage:
    base-path: /data/stashbox
    users-dir: users
    temp-dir: temp
    logs-dir: logs
  security:
    keycloak:
      server-url: http://localhost:8080
      realm: stashbox
      client-id: stashbox-backend
      client-secret: stashbox-backend-secret
      webhook:
        hmac-secret: webhook-hmac-secret
    cors:
      allowed-origins: http://localhost:3000
    public-endpoints: /actuator/health,/webhooks/keycloak

spring:
  application:
    name: stashbox-api
  web:
    resources:
      add-mappings: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 50
        one-indexed-parameters: false
  datasource:
    url: jdbc:postgresql://localhost:5432/stashboxdb
    username: stashboxdbuser
    password: stashboxdbpassword
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/stashbox
      client:
        registration:
          keycloak:
            client-id: stashbox-backend
            client-secret: stashbox-backend-secret
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/stashbox

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health

tests:
  users: # Inside config.keycloak.stashbox-realm-test.json
    normal:
      username: normal_user
      password: password
    admin:
      username: admin_user
      password: password
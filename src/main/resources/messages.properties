error.media.notSupported.title=Unsupported Media Type
error.media.notSupported.detail=Media type ''{0}'' is not supported. Please use application/json.
error.media.notAcceptable.title=Not Acceptable
error.media.notAcceptable.detail=The requested media type cannot be produced by this endpoint.

# Upload
error.upload.sizeLimitExceeded.title=Payload Too Large
error.upload.sizeLimitExceeded.detail=The uploaded file exceeds the maximum allowed size.

server:
  port: ${STASHBOX_PORT:9001}

stashbox-api:
  app:
    routes:
      saved: /stashbox/saved
      temp: /stashbox/temp
      logs: /stashbox/logs

spring:
  application:
    name: stashbox-api
  web:
    resources:
      add-mappings: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 50
        one-indexed-parameters: false
  datasource:
    url: ${STASHBOX_DB_URL:jdbc:postgresql://localhost:5432/stashboxdb}
    username: ${STASHBOX_DB_USER:stashboxdbuser}
    password: ${STASHBOX_DB_PASSWORD:stashboxdbpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

logging:
  level:
    root: INFO
    org.springframework.web: WARN

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: ${BACKEND_PORT}

app:
  storage:
    base-path: ${STORAGE_BASE_PATH}
    users-dir: generated
    temp-dir: temp
    logs-dir: logs
  security:
    keycloak:
      server-url: ${KEYCLOAK_URL}
      realm: ${KEYCLOAK_REALM}
      client-id: ${KEYCLOAK_CLIENT_ID}
      client-secret: ${KEYCLOAK_CLIENT_SECRET}
      webhook:
        hmac-secret: ${KEYCLOAK_WEBHOOK_HMAC_SECRET}
    cors:
      allowed-origins: ${FRONTEND_URL}
    public-endpoints: ${PUBLIC_ENDPOINTS}

spring:
  application:
    name: stashbox-api
  web:
    resources:
      add-mappings: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 50
        one-indexed-parameters: false
  datasource:
    url: ${STASHBOX_DB_URL}
    username: ${STASHBOX_DB_USER}
    password: ${STASHBOX_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}

logging:
  level:
    root: INFO
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health
